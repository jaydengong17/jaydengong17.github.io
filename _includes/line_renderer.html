<canvas onmousemove="updateMousePos(event)"
        onmousedown="mouseDownChange(event, true)"
        onmouseup="mouseDownChange(event, false)"
        onmouseenter="mouseOverChange(event, true)"
        onmouseleave="mouseOverChange(event, false)"
        id="canvas" width="500" height="500"
        style="border:1px solid #000000; margin: 10 px">
</canvas>
